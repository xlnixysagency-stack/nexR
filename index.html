<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nexr — Social, leveled up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg:#050507;
      --panel:rgba(14,14,18,.88);
      --panel2:rgba(18,18,24,.96);
      --soft:rgba(255,255,255,.05);
      --soft2:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.08);
      --text:#f0f0f5;
      --muted:#8888a0;
      --accent:#00e5ff;
      --accent2:#7c3aed;
      --hot:#ff2bd6;
      --danger:#ff4d6d;
      --success:#22d3a0;
      --r-card:24px;
      --r-pill:999px;
      --sidebar-w:240px;
      --rightbar-w:290px;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }

    body {
      min-height:100vh;
      color:var(--text);
      font-family:'DM Sans', Arial, sans-serif;
      font-size:15px;
      line-height:1.5;
      background:
        radial-gradient(ellipse 60% 40% at 15% 0%, rgba(0,229,255,.13), transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 10%, rgba(124,58,237,.18), transparent 55%),
        radial-gradient(ellipse 40% 35% at 45% 100%, rgba(255,43,214,.09), transparent 50%),
        var(--bg);
      overflow-x:hidden;
    }

    img { display:block; max-width:100%; }
    a { color:inherit; text-decoration:none; }
    button { font-family:inherit; cursor:pointer; }
    svg { width:20px; height:20px; }

    .card {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--r-card);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      box-shadow:0 18px 70px rgba(0,0,0,.22);
    }

    .app {
      width:min(1200px, 100%);
      margin:0 auto;
      padding:20px 16px 90px;
      display:grid;
      grid-template-columns:var(--sidebar-w) minmax(0,1fr) var(--rightbar-w);
      gap:16px;
      align-items:start;
    }

    .logo {
      font-family:'Space Grotesk', Arial, sans-serif;
      font-size:32px;
      font-weight:900;
      letter-spacing:-1.5px;
      display:inline-flex;
      align-items:center;
    }

    .logo span {
      color:var(--accent);
      text-shadow:0 0 20px rgba(0,229,255,.65);
    }

    .sidebar {
      position:sticky;
      top:20px;
      height:max-content;
      padding:20px 14px 18px;
      z-index:10;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .sidebar .logo { margin-bottom:18px; }

    .nav { display:flex; flex-direction:column; gap:2px; }

    .nav a {
      display:flex;
      align-items:center;
      gap:11px;
      padding:11px 13px;
      border-radius:16px;
      color:var(--muted);
      font-weight:700;
      font-size:14.5px;
      position:relative;
      transition:.16s ease;
    }

    .nav a:hover, .nav a.active { color:var(--text); background:var(--soft2); }
    .nav a.active::before {
      content:"";
      position:absolute;
      left:0;
      top:25%;
      bottom:25%;
      width:3px;
      border-radius:999px;
      background:linear-gradient(to bottom,var(--accent),var(--accent2));
    }

    .nav a svg { width:19px; height:19px; flex-shrink:0; }

    .badge {
      margin-left:auto;
      min-width:18px;
      padding:2px 6px;
      border-radius:999px;
      background:var(--hot);
      color:white;
      font-size:10px;
      font-weight:900;
      text-align:center;
    }

    .create-btn {
      margin-top:14px;
      width:100%;
      border:0;
      border-radius:var(--r-pill);
      padding:13px;
      font-size:14px;
      font-weight:900;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#010104;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.18s ease;
    }

    .create-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,229,255,.25); }
    .create-btn:active { transform:scale(.97); }

    .feed {
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .top-mobile {
      display:none;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
    }

    .mobile-actions { display:flex; gap:8px; }

    .mobile-actions a {
      width:42px;
      height:42px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:var(--soft);
      color:var(--muted);
      transition:.16s ease;
    }

    .mobile-actions a:hover { background:var(--soft2); color:var(--text); }

    .feed-header { padding:18px; }

    .feed-header h1 {
      font-family:'Space Grotesk', Arial, sans-serif;
      font-size:34px;
      line-height:1;
      letter-spacing:-1.5px;
      font-weight:900;
    }

    .feed-header p { color:var(--muted); font-size:14px; margin-top:6px; }

    .tabs {
      display:flex;
      gap:8px;
      margin-top:15px;
      overflow-x:auto;
      padding-bottom:2px;
      scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar { display:none; }

    .tab {
      flex-shrink:0;
      border:1px solid var(--line);
      background:transparent;
      color:var(--muted);
      border-radius:var(--r-pill);
      padding:9px 16px;
      font-size:13.5px;
      font-weight:900;
      transition:.16s ease;
    }

    .tab:hover { color:var(--text); border-color:var(--soft2); }
    .tab.active {
      color:#010104;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-color:transparent;
    }

    .pulse { padding:16px; }
    .pulse-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:13px; gap:12px; }
    .pulse-head strong { font-size:15px; font-weight:900; }
    .pulse-head small { color:var(--muted); font-size:13px; }

    .pulse-row {
      display:flex;
      gap:14px;
      overflow-x:auto;
      padding-bottom:4px;
      scrollbar-width:none;
    }
    .pulse-row::-webkit-scrollbar { display:none; }

    .story { width:68px; flex:0 0 auto; text-align:center; }
    .story-ring {
      width:64px;
      height:64px;
      border-radius:50%;
      padding:2px;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--hot));
      margin:0 auto 7px;
    }
    .story-inner { width:100%; height:100%; border-radius:50%; padding:3px; background:#08080b; overflow:hidden; }
    .story-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .story span { display:block; color:var(--muted); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .message {
      display:none;
      padding:12px 14px;
      border-radius:18px;
      border:1px solid rgba(255,77,109,.28);
      background:rgba(255,77,109,.08);
      color:#ffd5dc;
      font-weight:800;
    }
    .message:not(:empty) { display:block; }
    .message.success { border-color:rgba(34,211,160,.28); background:rgba(34,211,160,.08); color:#b9ffe9; }

    #posts { display:flex; flex-direction:column; gap:14px; }

    .post {
      overflow:hidden;
      animation:postIn .38s ease both;
    }

    @keyframes postIn {
      from { opacity:0; transform:translateY(14px); }
      to { opacity:1; transform:translateY(0); }
    }

    .post-head {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
    }

    .user-link, .suggest-user, .me {
      display:flex;
      align-items:center;
      gap:11px;
      min-width:0;
    }

    .avatar {
      width:44px;
      height:44px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#010104;
      font-weight:900;
      overflow:hidden;
      flex:0 0 auto;
    }

    .avatar img { width:100%; height:100%; object-fit:cover; }

    .user-meta, .me-info, .suggest-user > div { min-width:0; }
    .user-meta strong, .user-meta small, .me-info strong, .me-info small, .suggest-user strong, .suggest-user small {
      display:block;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
    }
    .user-meta small, .me-info small, .suggest-user small { color:var(--muted); font-size:12.5px; }

    .name-row { display:flex; align-items:center; gap:7px; min-width:0; }
    .creator-badge {
      display:inline-flex;
      align-items:center;
      height:19px;
      padding:0 7px;
      border-radius:999px;
      border:1px solid rgba(0,229,255,.35);
      background:rgba(0,229,255,.09);
      color:#b8f9ff;
      font-size:10px;
      font-weight:900;
      box-shadow:0 0 16px rgba(0,229,255,.12);
      flex:0 0 auto;
    }

    .follow-btn, .suggest-follow-btn {
      border:1px solid var(--line);
      background:#121216;
      color:white;
      border-radius:999px;
      padding:8px 13px;
      font-weight:900;
      transition:.16s ease;
    }
    .follow-btn:hover, .suggest-follow-btn:hover { border-color:rgba(0,229,255,.35); }
    .follow-btn.following { color:var(--muted); background:transparent; }

    .icon-btn {
      width:40px;
      height:40px;
      border:0;
      border-radius:50%;
      background:transparent;
      color:white;
      display:grid;
      place-items:center;
      transition:.16s ease;
    }
    .icon-btn:hover { background:var(--soft); }
    .icon-btn.active { color:var(--hot); }
    .icon-btn.saved { color:var(--accent); }
    .icon-btn.danger { color:var(--danger); }

    .post-media { position:relative; background:#09090b; overflow:hidden; }
    .post-img { width:100%; max-height:650px; object-fit:cover; background:#09090b; }

    .post-body { padding:13px 16px 16px; }
    .actions { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .action-left { display:flex; gap:5px; }
    .likes-count { font-weight:900; font-size:14px; margin-bottom:6px; }
    .caption { color:#e8e8ee; line-height:1.55; white-space:pre-wrap; }
    .caption strong { color:white; margin-right:5px; }
    .comments-link { display:inline-block; color:var(--muted); font-size:13.5px; margin-top:8px; }

    .heart-burst {
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.35);
      width:94px;
      height:94px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:var(--hot);
      filter:drop-shadow(0 0 26px rgba(255,43,214,.6));
      animation:heartPop .78s ease forwards;
      pointer-events:none;
      z-index:5;
    }
    .heart-burst svg { width:92px; height:92px; fill:currentColor; stroke-width:1.5; }

    @keyframes heartPop {
      0% { opacity:0; transform:translate(-50%,-50%) scale(.25) rotate(-8deg); }
      18% { opacity:1; transform:translate(-50%,-50%) scale(1.12) rotate(4deg); }
      45% { opacity:1; transform:translate(-50%,-50%) scale(.95); }
      100% { opacity:0; transform:translate(-50%,-58%) scale(1.35); }
    }

    .heart-particle {
      position:absolute;
      left:50%;
      top:50%;
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--hot),var(--accent));
      pointer-events:none;
      z-index:5;
      animation:particleFly .72s ease forwards;
      box-shadow:0 0 14px rgba(0,229,255,.5);
    }
    @keyframes particleFly {
      to { opacity:0; transform:translate(var(--x), var(--y)) scale(.2); }
    }
    .like-pop { animation:likePop .32s ease; }
    @keyframes likePop { 50% { transform:scale(1.25); } }

    .empty {
      padding:20px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .skeleton-post { overflow:hidden; }
    .sk-head { display:flex; gap:12px; padding:14px 16px; }
    .sk {
      border-radius:999px;
      background:linear-gradient(90deg,rgba(255,255,255,.055),rgba(255,255,255,.1),rgba(255,255,255,.055));
      background-size:220% 100%;
      animation:shimmer 1.25s linear infinite;
    }
    .sk-circle { border-radius:50%; }
    @keyframes shimmer { to { background-position:-220% 0; } }

    .rightbar { position:sticky; top:20px; display:flex; flex-direction:column; gap:14px; }
    .profile-card, .suggest { padding:16px; }
    .me-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; }

    .me-btn {
      border-radius:999px;
      padding:10px 12px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-size:13px;
    }
    .me-btn.primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#010104; }
    .me-btn.secondary { background:#121216; border:1px solid var(--line); color:white; }

    .suggest h3 { font-size:18px; margin-bottom:12px; }
    .suggest-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
    .suggest-head h3 { margin:0; }
    .see-all { color:var(--accent); font-size:12px; font-weight:900; }
    .suggestions { display:grid; gap:10px; }
    .suggest-item { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .suggest-item .avatar { width:40px; height:40px; }

    @media (max-width:1024px) {
      :root { --sidebar-w:64px; --rightbar-w:260px; }
      .sidebar { padding:20px 8px 18px; align-items:center; }
      .sidebar .logo { font-size:26px; margin-bottom:16px; }
      .nav a { padding:12px; justify-content:center; }
      .nav a span, .nav a .badge { display:none; }
      .nav a::before { display:none; }
      .create-btn { width:44px; height:44px; padding:0; border-radius:50%; }
      .create-btn span { display:none; }
    }

    @media (max-width:860px) {
      body { padding-bottom:110px; }

      .app {
        width:100%;
        max-width:100%;
        margin:0 auto;
        padding:16px 16px 130px;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:12px;
      }

      .sidebar, .rightbar { display:none; }

      .feed {
        width:100%;
        max-width:520px;
        margin:0 auto;
        align-items:stretch;
        gap:12px;
      }

      .top-mobile,
      .feed-header,
      .pulse,
      .message,
      #posts,
      .post,
      .empty,
      .skeleton-post {
        width:100%;
        max-width:520px;
        margin-left:auto;
        margin-right:auto;
      }

      .top-mobile { display:flex; }
      .feed-header { padding:18px; text-align:left; }
      .feed-header h1 { font-size:30px; }
      .tabs { justify-content:flex-start; }
      .post-img { max-height:520px; }
    }

    @media (max-width:430px) {
      .app { padding-left:12px; padding-right:12px; }
      .top-mobile { padding:12px 14px; border-radius:26px; }
      .mobile-actions a { width:40px; height:40px; }
      .feed-header, .pulse { border-radius:26px; }
      .feed-header h1 { font-size:28px; }
      .feed-header p { font-size:13.5px; }
      .tab { padding:9px 15px; }
    }

    @media (max-width:370px) {
      .app { padding-left:10px; padding-right:10px; }
      .logo { font-size:28px; }
      .feed-header h1 { font-size:25px; }
      .mobile-actions { gap:6px; }
      .mobile-actions a { width:38px; height:38px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar card">
      <a class="logo" href="index.html">Nex<span>r</span></a>
      <nav class="nav" aria-label="Desktop navigation">
        <a class="active" href="index.html"><i data-lucide="home"></i><span>Home</span></a>
        <a href="explore.html"><i data-lucide="compass"></i><span>Explore</span></a>
        <a href="search.html"><i data-lucide="search"></i><span>Search</span></a>
        <a href="notifications.html"><i data-lucide="bell"></i><span>Notifications</span><span class="badge" id="notifBadge" style="display:none"></span></a>
        <a href="messages.html"><i data-lucide="message-circle"></i><span>Messages</span></a>
        <a href="reels.html"><i data-lucide="clapperboard"></i><span>Reels</span></a>
        <a href="profile.html"><i data-lucide="user"></i><span>Profile</span></a>
        <a href="settings.html"><i data-lucide="settings"></i><span>Settings</span></a>
      </nav>
      <button class="create-btn" onclick="location.href='create.html'"><i data-lucide="plus"></i><span>Create</span></button>
    </aside>

    <main class="feed">
      <header class="top-mobile card">
        <a class="logo" href="index.html">Nex<span>r</span></a>
        <div class="mobile-actions">
          <a href="create.html" aria-label="Create"><i data-lucide="plus"></i></a>
          <a href="notifications.html" aria-label="Notifications"><i data-lucide="bell"></i></a>
          <a href="messages.html" aria-label="Messages"><i data-lucide="message-circle"></i></a>
          <a href="profile.html" aria-label="Profile"><i data-lucide="user"></i></a>
        </div>
      </header>

      <section class="feed-header card">
        <h1>Nexr Flow</h1>
        <p>Real posts from real people. Social, leveled up.</p>
        <div class="tabs" role="tablist">
          <button class="tab active" data-feed="forYou" role="tab" aria-selected="true">For You</button>
          <button class="tab" data-feed="following" role="tab" aria-selected="false">Following</button>
          <button class="tab" data-feed="rising" role="tab" aria-selected="false">Rising</button>
        </div>
      </section>

      <section class="pulse card">
        <div class="pulse-head">
          <strong>Pulse</strong>
          <small>Story posts only</small>
        </div>
        <div class="pulse-row" id="pulseRow">
          <div class="empty" style="padding:0;font-size:13px">No Pulse stories yet. Create one!</div>
        </div>
      </section>

      <div class="message" id="message" role="status" aria-live="polite"></div>

      <section id="posts">
        <article class="skeleton-post card">
          <div class="sk-head">
            <div class="sk sk-circle" style="width:44px;height:44px;flex-shrink:0"></div>
            <div style="flex:1;display:grid;gap:8px">
              <div class="sk" style="height:13px;width:55%"></div>
              <div class="sk" style="height:11px;width:35%"></div>
            </div>
          </div>
          <div class="sk" style="height:260px;border-radius:0"></div>
          <div style="padding:14px 16px;display:grid;gap:10px">
            <div class="sk" style="height:12px;width:40%"></div>
            <div class="sk" style="height:12px;width:75%"></div>
          </div>
        </article>
      </section>
    </main>

    <aside class="rightbar">
      <section class="profile-card card">
        <div class="me" id="meCard">
          <div class="avatar">N</div>
          <div class="me-info">
            <strong>Loading…</strong>
            <small>Social, leveled up.</small>
          </div>
        </div>
        <div class="me-actions">
          <a href="profile.html" class="me-btn primary"><i data-lucide="user"></i>Profile</a>
          <a href="settings.html" class="me-btn secondary"><i data-lucide="settings"></i>Settings</a>
        </div>
      </section>

      <section class="suggest card">
        <div class="suggest-head">
          <h3>Rising Creators</h3>
          <a class="see-all" href="search.html?filter=creators">See all</a>
        </div>
        <div class="suggestions" id="suggestions">
          <div class="empty">Loading…</div>
        </div>
      </section>
    </aside>
  </div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { injectMobileNav, startNotifBadge } from './nav.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
    import {
      collection,
      doc,
      getDoc,
      getDocs,
      query,
      orderBy,
      onSnapshot,
      updateDoc,
      arrayUnion,
      arrayRemove,
      addDoc,
      deleteDoc,
      serverTimestamp,
      limit
    } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';

    injectMobileNav('home');

    let currentUser = null;
    let currentUserData = null;
    let allPosts = [];
    let allUsers = [];
    let activeFeed = 'forYou';

    const postsEl = document.getElementById('posts');
    const pulseRow = document.getElementById('pulseRow');
    const messageEl = document.getElementById('message');
    const meCard = document.getElementById('meCard');
    const suggestionsEl = document.getElementById('suggestions');

    onAuthStateChanged(auth, async user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      currentUser = user;
      currentUserData = await getUserData(user.uid);
      await loadUsers();

      renderMe();
      renderSuggestions();
      listenForPosts();
      startNotifBadge(db, user.uid);
    });

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        activeFeed = tab.dataset.feed;
        renderPosts();
      });
    });

    async function getUserData(uid) {
      const snapshot = await getDoc(doc(db, 'users', uid));
      if (!snapshot.exists()) {
        return {
          uid,
          username: currentUser.displayName || currentUser.email?.split('@')[0] || 'creator',
          email: currentUser.email || '',
          avatarUrl: currentUser.photoURL || '',
          bio: 'Social, leveled up.',
          followers: [],
          following: [],
          savedPosts: []
        };
      }
      return { uid, followers: [], following: [], savedPosts: [], ...snapshot.data() };
    }

    async function loadUsers() {
      const snapshot = await getDocs(collection(db, 'users'));
      allUsers = snapshot.docs
        .map(d => ({ id:d.id, uid:d.id, followers:[], following:[], savedPosts:[], ...d.data() }))
        .filter(u => u.username && u.email);
    }

    function listenForPosts() {
      const postsQuery = query(collection(db, 'posts'), orderBy('createdAt', 'desc'), limit(80));

      onSnapshot(postsQuery, snapshot => {
        allPosts = snapshot.docs.map(d => ({
          id:d.id,
          likedBy:[],
          savedBy:[],
          likesCount:0,
          commentsCount:0,
          commentPreview:[],
          isStory:false,
          ...d.data()
        }));
        renderPulse();
        renderPosts();
      }, error => {
        console.error(error);
        showMessage(error.message, false);
      });
    }

    function renderMe() {
      meCard.innerHTML = `
        ${getAvatarHTML(currentUserData, 'avatar')}
        <div class="me-info">
          <div class="name-row"><strong>${escapeHTML(currentUserData.username || 'creator')}</strong>${creatorBadge(currentUserData)}</div>
          <small>${escapeHTML(currentUserData.bio || 'Social, leveled up.')}</small>
        </div>
      `;
      refreshIcons();
    }

    function renderPulse() {
      const stories = allPosts.filter(p => p.isStory === true && getPostImage(p));
      if (!stories.length) {
        pulseRow.innerHTML = '<div class="empty" style="padding:0;font-size:13px">No Pulse stories yet. Create one!</div>';
        return;
      }

      pulseRow.innerHTML = stories.map(post => `
        <a class="story" href="post.html?id=${post.id}">
          <div class="story-ring"><div class="story-inner"><img src="${getPostImage(post)}" alt="${escapeHTML(post.username || 'Story')}" loading="lazy"></div></div>
          <span>${escapeHTML(post.username || 'creator')}</span>
        </a>
      `).join('');
    }

    function renderPosts() {
      let posts = [...allPosts];

      if (activeFeed === 'following') {
        const following = currentUserData.following || [];
        posts = posts.filter(p => following.includes(p.userId));
      }

      if (activeFeed === 'rising') {
        posts.sort((a, b) => ((b.likesCount || 0) + (b.commentsCount || 0) * 2) - ((a.likesCount || 0) + (a.commentsCount || 0) * 2));
      }

      if (!posts.length) {
        postsEl.innerHTML = '<article class="card empty">No posts here yet. Be the first!</article>';
        return;
      }

      postsEl.innerHTML = posts.map((post, index) => createPostHTML(post, index)).join('');
      refreshIcons();
      attachPostEvents();
    }

    function createPostHTML(post, index = 0) {
      const liked = (post.likedBy || []).includes(currentUser.uid);
      const saved = (post.savedBy || []).includes(currentUser.uid) || (currentUserData.savedPosts || []).includes(post.id);
      const ownPost = post.userId === currentUser.uid;
      const isStranger = !ownPost && !!post.userId;
      const following = (currentUserData.following || []).includes(post.userId);
      const image = getPostImage(post);
      const author = allUsers.find(u => u.uid === post.userId) || post;

      return `
        <article class="post card" data-post-id="${post.id}" data-user-id="${post.userId || ''}" style="animation-delay:${index * 0.035}s">
          <div class="post-head">
            <a class="user-link" href="profile.html?uid=${post.userId || ''}">
              ${getAvatarHTML(post, 'avatar')}
              <div class="user-meta">
                <div class="name-row"><strong>${escapeHTML(post.username || 'creator')}</strong>${creatorBadge(author)}</div>
                <small>${formatDate(post.createdAt)}${post.isStory ? ' · Pulse' : ''}</small>
              </div>
            </a>
            ${ownPost
              ? `<button class="icon-btn danger" data-action="delete" aria-label="Delete post"><i data-lucide="trash-2"></i></button>`
              : isStranger
                ? `<button class="follow-btn ${following ? 'following' : ''}" data-action="follow">${following ? 'Following' : 'Follow'}</button>`
                : ''}
          </div>

          ${image ? `<div class="post-media"><a href="post.html?id=${post.id}"><img class="post-img" src="${image}" alt="Nexr post" loading="lazy"></a></div>` : ''}

          <div class="post-body">
            <div class="actions">
              <div class="action-left">
                <button class="icon-btn ${liked ? 'active' : ''}" data-action="like" aria-label="Like"><i data-lucide="heart"></i></button>
                <a class="icon-btn" href="post.html?id=${post.id}" aria-label="Comment"><i data-lucide="message-circle"></i></a>
                <button class="icon-btn" data-action="share" aria-label="Share"><i data-lucide="send"></i></button>
              </div>
              <button class="icon-btn ${saved ? 'saved' : ''}" data-action="save" aria-label="Save"><i data-lucide="bookmark"></i></button>
            </div>

            <div class="likes-count">${post.likesCount || 0} like${(post.likesCount || 0) === 1 ? '' : 's'}</div>
            ${post.caption ? `<p class="caption"><strong>${escapeHTML(post.username || 'creator')}</strong>${escapeHTML(post.caption)}</p>` : ''}
            ${(post.commentsCount || 0) > 0 ? `<a class="comments-link" href="post.html?id=${post.id}">View ${post.commentsCount} comment${post.commentsCount === 1 ? '' : 's'}</a>` : ''}
          </div>
        </article>
      `;
    }

    function renderSuggestions() {
      const following = currentUserData.following || [];
      const suggestions = allUsers
        .filter(u => u.uid !== currentUser.uid)
        .filter(u => !following.includes(u.uid))
        .filter(u => u.isCreator === true || u.creatorTag)
        .slice(0, 3);

      if (!suggestions.length) {
        suggestionsEl.innerHTML = '<div class="empty">No creators yet.</div>';
        return;
      }

      suggestionsEl.innerHTML = suggestions.map(user => `
        <div class="suggest-item">
          <a class="suggest-user" href="profile.html?uid=${user.uid}">
            ${getAvatarHTML(user, 'avatar')}
            <div>
              <div class="name-row"><strong>${escapeHTML(user.username || 'creator')}</strong>${creatorBadge(user)}</div>
              <small>${(user.followers || []).length} followers</small>
            </div>
          </a>
          <button class="suggest-follow-btn" data-suggest-follow="${user.uid}">Follow</button>
        </div>
      `).join('');

      document.querySelectorAll('[data-suggest-follow]').forEach(btn => {
        btn.addEventListener('click', () => toggleFollow(btn.dataset.suggestFollow));
      });
      refreshIcons();
    }

    function attachPostEvents() {
      document.querySelectorAll('.post').forEach(postEl => {
        const postId = postEl.dataset.postId;
        const userId = postEl.dataset.userId;
        const media = postEl.querySelector('.post-media');

        postEl.querySelector('[data-action="like"]')?.addEventListener('click', () => toggleLike(postId));
        postEl.querySelector('[data-action="save"]')?.addEventListener('click', () => toggleSave(postId));
        postEl.querySelector('[data-action="delete"]')?.addEventListener('click', () => deleteOwnPost(postId));
        postEl.querySelector('[data-action="follow"]')?.addEventListener('click', () => toggleFollow(userId));
        postEl.querySelector('[data-action="share"]')?.addEventListener('click', () => sharePost(postId));

        if (media) {
          let lastTap = 0;
          media.addEventListener('click', event => {
            const now = Date.now();
            if (now - lastTap < 280) {
              event.preventDefault();
              toggleLike(postId, { forceLike:true, burstTarget:media });
            }
            lastTap = now;
          });
        }
      });
    }

    async function toggleLike(postId, options = {}) {
      const post = allPosts.find(p => p.id === postId);
      if (!post) return;

      const alreadyLiked = (post.likedBy || []).includes(currentUser.uid);
      const shouldLike = options.forceLike ? true : !alreadyLiked;

      if (alreadyLiked && options.forceLike) {
        playHeartBurst(options.burstTarget || document.querySelector(`[data-post-id="${postId}"] .post-media`));
        return;
      }

      post.likedBy = shouldLike
        ? [...(post.likedBy || []), currentUser.uid]
        : (post.likedBy || []).filter(uid => uid !== currentUser.uid);
      post.likesCount = shouldLike ? (post.likesCount || 0) + 1 : Math.max((post.likesCount || 0) - 1, 0);
      updatePostLikeUI(postId, shouldLike, post.likesCount);

      if (shouldLike) playHeartBurst(options.burstTarget || document.querySelector(`[data-post-id="${postId}"] .post-media`));

      try {
        await updateDoc(doc(db, 'posts', postId), {
          likedBy: shouldLike ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid),
          likesCount: post.likesCount
        });

        if (shouldLike && post.userId && post.userId !== currentUser.uid) {
          await createNotification(post.userId, 'like', 'liked your post', postId);
        }
      } catch (error) {
        console.error(error);
        post.likedBy = alreadyLiked ? [...(post.likedBy || []), currentUser.uid] : (post.likedBy || []).filter(uid => uid !== currentUser.uid);
        post.likesCount = alreadyLiked ? (post.likesCount || 0) + 1 : Math.max((post.likesCount || 0) - 1, 0);
        updatePostLikeUI(postId, alreadyLiked, post.likesCount);
        showMessage('Could not update like. Try again.', false);
      }
    }

    function updatePostLikeUI(postId, liked, likesCount) {
      const postEl = document.querySelector(`.post[data-post-id="${postId}"]`);
      if (!postEl) return;

      const likeBtn = postEl.querySelector('[data-action="like"]');
      const likesEl = postEl.querySelector('.likes-count');

      if (likeBtn) {
        likeBtn.classList.toggle('active', liked);
        likeBtn.classList.remove('like-pop');
        void likeBtn.offsetWidth;
        if (liked) likeBtn.classList.add('like-pop');
      }

      if (likesEl) likesEl.textContent = `${likesCount || 0} like${likesCount === 1 ? '' : 's'}`;
    }

    function playHeartBurst(target) {
      if (!target) return;
      const host = target.classList?.contains('post-media') ? target : target.closest?.('.post')?.querySelector('.post-media') || target;
      if (!host) return;

      const heart = document.createElement('div');
      heart.className = 'heart-burst';
      heart.innerHTML = '<i data-lucide="heart"></i>';
      host.appendChild(heart);

      [[0,-72],[52,-48],[72,0],[48,52],[0,72],[-48,52],[-72,0],[-52,-48]].forEach(([x, y], index) => {
        const particle = document.createElement('span');
        particle.className = 'heart-particle';
        particle.style.setProperty('--x', `${x}px`);
        particle.style.setProperty('--y', `${y}px`);
        particle.style.animationDelay = `${index * 0.018}s`;
        host.appendChild(particle);
        setTimeout(() => particle.remove(), 850);
      });

      refreshIcons();
      setTimeout(() => heart.remove(), 850);
    }

    async function toggleSave(postId) {
      const saved = (currentUserData.savedPosts || []).includes(postId);
      const userRef = doc(db, 'users', currentUser.uid);
      const postRef = doc(db, 'posts', postId);

      await updateDoc(userRef, { savedPosts: saved ? arrayRemove(postId) : arrayUnion(postId) });
      await updateDoc(postRef, { savedBy: saved ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) });

      currentUserData.savedPosts = saved
        ? (currentUserData.savedPosts || []).filter(id => id !== postId)
        : [...(currentUserData.savedPosts || []), postId];
      renderPosts();
    }

    async function toggleFollow(targetUserId) {
      if (!targetUserId || targetUserId === currentUser.uid) return;

      const following = (currentUserData.following || []).includes(targetUserId);
      await updateDoc(doc(db, 'users', currentUser.uid), {
        following: following ? arrayRemove(targetUserId) : arrayUnion(targetUserId)
      });
      await updateDoc(doc(db, 'users', targetUserId), {
        followers: following ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
      });

      currentUserData.following = following
        ? (currentUserData.following || []).filter(id => id !== targetUserId)
        : [...(currentUserData.following || []), targetUserId];

      if (!following) await createNotification(targetUserId, 'follow', 'started following you');

      renderPosts();
      renderSuggestions();
    }

    async function deleteOwnPost(postId) {
      const post = allPosts.find(p => p.id === postId);
      if (!post || post.userId !== currentUser.uid) return;
      if (!confirm('Delete this post? This cannot be undone.')) return;
      await deleteDoc(doc(db, 'posts', postId));
      showMessage('Post deleted.', true);
    }

    async function sharePost(postId) {
      const url = `${location.origin}${location.pathname.replace('index.html', '')}post.html?id=${postId}`;
      try {
        if (navigator.share) await navigator.share({ title:'Nexr post', url });
        else {
          await navigator.clipboard.writeText(url);
          showMessage('Post link copied.', true);
        }
      } catch (error) {
        if (error.name !== 'AbortError') showMessage('Could not share post.', false);
      }
    }

    async function createNotification(toUserId, type, text, postId = '') {
      await addDoc(collection(db, 'notifications'), {
        toUserId,
        fromUserId:currentUser.uid,
        fromUsername:currentUserData.username || 'creator',
        type,
        text,
        postId,
        read:false,
        createdAt:serverTimestamp()
      });
    }

    function getAvatarHTML(data, className) {
      const name = data?.username || data?.displayName || 'N';
      const avatarUrl = data?.avatarUrl || data?.photoURL || '';
      if (avatarUrl) return `<div class="${className}"><img src="${avatarUrl}" alt="${escapeHTML(name)}" loading="lazy"></div>`;
      return `<div class="${className}">${escapeHTML(name.charAt(0).toUpperCase())}</div>`;
    }

    function getPostImage(post) {
      return post.imageData || post.imageUrl || '';
    }

    function creatorBadge(user) {
      return (user?.isCreator === true || user?.creatorTag) ? '<span class="creator-badge">Creator</span>' : '';
    }

    function formatDate(timestamp) {
      if (!timestamp?.toDate) return 'Just now';
      const date = timestamp.toDate();
      const diff = Date.now() - date.getTime();
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return date.toLocaleDateString();
    }

    function showMessage(text, success = false) {
      messageEl.textContent = text;
      messageEl.classList.toggle('success', success);
      if (text) {
        setTimeout(() => {
          messageEl.textContent = '';
          messageEl.classList.remove('success');
        }, 2800);
      }
    }

    function escapeHTML(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function refreshIcons() {
      if (window.lucide) window.lucide.createIcons();
    }

    refreshIcons();
  </script>
</body>
</html>
