<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexr — Social, leveled up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ─── Design tokens ─────────────────────────────────────── */
        :root {
          --bg:       #050507;
          --panel:    rgba(14,14,18,.88);
          --panel2:   rgba(18,18,24,.96);
          --soft:     rgba(255,255,255,.05);
          --soft2:    rgba(255,255,255,.08);
          --line:     rgba(255,255,255,.08);
          --text:     #f0f0f5;
          --muted:    #8888a0;
          --accent:   #00e5ff;
          --accent2:  #7c3aed;
          --hot:      #ff2bd6;
          --danger:   #ff4d6d;
          --success:  #22d3a0;

          --r-card:   24px;
          --r-pill:   999px;
          --sidebar-w: 240px;
          --rightbar-w: 290px;
        }

        /* ─── Reset ─────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
          min-height: 100vh;
          color: var(--text);
          font-family: 'DM Sans', sans-serif;
          font-size: 15px;
          line-height: 1.5;
          background:
            radial-gradient(ellipse 60% 40% at 15% 0%, rgba(0,229,255,.13) 0%, transparent 60%),
            radial-gradient(ellipse 50% 50% at 85% 10%, rgba(124,58,237,.18) 0%, transparent 55%),
            radial-gradient(ellipse 40% 35% at 45% 100%, rgba(255,43,214,.09) 0%, transparent 50%),
            var(--bg);
        }

        img { display: block; max-width: 100%; }
        a { color: inherit; text-decoration: none; }

        /* ─── App shell: 3-col desktop layout ───────────────────── */
        .app {
          width: min(1200px, 100%);
          margin: 0 auto;
          padding: 20px 16px 80px;
          display: grid;
          grid-template-columns: var(--sidebar-w) 1fr var(--rightbar-w);
          grid-template-rows: auto;
          gap: 16px;
          align-items: start;
        }

        /* ─── Generic card ───────────────────────────────────────── */
        .card {
          background: var(--panel);
          border: 1px solid var(--line);
          border-radius: var(--r-card);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
        }

        /* ─── Sidebar ────────────────────────────────────────────── */
        .sidebar {
          grid-column: 1;
          position: sticky;
          top: 20px;
          height: max-content;
          padding: 20px 14px 18px;
          z-index: 10;
          display: flex;
          flex-direction: column;
          gap: 6px;
        }

        .logo {
          font-family: 'Space Grotesk', sans-serif;
          font-size: 32px;
          font-weight: 700;
          letter-spacing: -1.5px;
          margin-bottom: 18px;
          display: inline-flex;
          align-items: center;
        }

        .logo span {
          color: var(--accent);
          text-shadow: 0 0 20px rgba(0,229,255,.6);
        }

        /* ─── Sidebar nav ────────────────────────────────────────── */
        .nav {
          display: flex;
          flex-direction: column;
          gap: 2px;
        }

        .nav a {
          display: flex;
          align-items: center;
          gap: 11px;
          padding: 11px 13px;
          border-radius: 16px;
          color: var(--muted);
          font-weight: 600;
          font-size: 14.5px;
          transition: background .15s, color .15s;
          position: relative;
        }

        .nav a svg { width: 19px; height: 19px; flex-shrink: 0; }

        .nav a:hover {
          color: var(--text);
          background: var(--soft);
        }

        .nav a.active {
          color: var(--text);
          background: var(--soft2);
        }

        .nav a.active::before {
          content: "";
          position: absolute;
          left: 0;
          top: 25%;
          bottom: 25%;
          width: 3px;
          border-radius: 999px;
          background: linear-gradient(to bottom, var(--accent), var(--accent2));
        }

        /* Notification badge */
        .nav a .badge {
          margin-left: auto;
          background: var(--hot);
          color: white;
          font-size: 10px;
          font-weight: 900;
          line-height: 1;
          padding: 2px 6px;
          border-radius: 999px;
          min-width: 18px;
          text-align: center;
        }

        .create-btn {
          margin-top: 14px;
          width: 100%;
          border: 0;
          border-radius: var(--r-pill);
          padding: 13px;
          font-family: 'DM Sans', sans-serif;
          font-size: 14px;
          font-weight: 700;
          cursor: pointer;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          color: #000;
          transition: opacity .15s, transform .15s, box-shadow .15s;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }

        .create-btn svg { width: 17px; height: 17px; }

        .create-btn:hover {
          opacity: .9;
          transform: translateY(-2px);
          box-shadow: 0 8px 30px rgba(0,229,255,.25);
        }

        .create-btn:active { transform: scale(.97); }

        /* ─── Feed (center) ──────────────────────────────────────── */
        .feed {
          grid-column: 2;
          display: flex;
          flex-direction: column;
          gap: 14px;
          min-width: 0;
        }

        /* ─── Mobile topbar (hidden on desktop) ──────────────────── */
        .top-mobile {
          display: none;
          align-items: center;
          justify-content: space-between;
          padding: 12px 16px;
        }

        .mobile-actions {
          display: flex;
          gap: 8px;
        }

        .mobile-actions a {
          width: 42px;
          height: 42px;
          border-radius: 50%;
          display: grid;
          place-items: center;
          background: var(--soft);
          color: var(--muted);
          transition: background .15s, color .15s;
        }

        .mobile-actions a:hover {
          background: var(--soft2);
          color: var(--text);
        }

        .mobile-actions a svg { width: 20px; height: 20px; }

        /* ─── Feed header / tabs ─────────────────────────────────── */
        .feed-header {
          padding: 18px 18px 14px;
        }

        .feed-header h1 {
          font-family: 'Space Grotesk', sans-serif;
          font-size: 34px;
          font-weight: 700;
          letter-spacing: -1.5px;
          line-height: 1;
        }

        .feed-header p {
          color: var(--muted);
          font-size: 14px;
          margin-top: 5px;
        }

        .tabs {
          display: flex;
          gap: 8px;
          margin-top: 14px;
          overflow-x: auto;
          padding-bottom: 2px;
          scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab {
          flex-shrink: 0;
          border: 1px solid var(--line);
          background: transparent;
          color: var(--muted);
          border-radius: var(--r-pill);
          padding: 9px 16px;
          font-family: 'DM Sans', sans-serif;
          font-size: 13.5px;
          font-weight: 700;
          cursor: pointer;
          transition: background .15s, color .15s, border-color .15s;
        }

        .tab:hover { color: var(--text); border-color: var(--soft2); }

        .tab.active {
          color: #000;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          border-color: transparent;
        }

        /* ─── Pulse (stories) ────────────────────────────────────── */
        .pulse {
          padding: 16px;
        }

        .pulse-head {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 13px;
        }

        .pulse-head strong { font-size: 15px; font-weight: 700; }
        .pulse-head small { color: var(--muted); font-size: 13px; }

        .pulse-row {
          display: flex;
          gap: 14px;
          overflow-x: auto;
          padding-bottom: 4px;
          scrollbar-width: none;
        }

        .pulse-row::-webkit-scrollbar { display: none; }

        .story {
          flex: 0 0 72px;
          text-align: center;
          cursor: pointer;
        }

        .story-ring {
          width: 68px;
          height: 68px;
          border-radius: 50%;
          padding: 2.5px;
          background: linear-gradient(135deg, var(--hot), var(--accent2), var(--accent));
          margin: 0 auto;
        }

        .story-inner {
          width: 100%;
          height: 100%;
          border-radius: 50%;
          overflow: hidden;
          background: #111;
          border: 2.5px solid var(--bg);
          display: grid;
          place-items: center;
          font-weight: 800;
          font-size: 22px;
        }

        .story-inner img { width: 100%; height: 100%; object-fit: cover; }

        .story span {
          display: block;
          color: var(--muted);
          font-size: 11px;
          font-weight: 600;
          margin-top: 6px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          max-width: 68px;
        }

        /* ─── Posts ──────────────────────────────────────────────── */
        .post {
          overflow: hidden;
          animation: rise .4s ease both;
        }

        @keyframes rise {
          from { opacity: 0; transform: translateY(14px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .post-head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 12px;
          padding: 14px 16px;
        }

        .user-link {
          display: flex;
          align-items: center;
          gap: 11px;
          min-width: 0;
          flex: 1;
        }

        .avatar {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          color: #000;
          font-weight: 800;
          display: grid;
          place-items: center;
          overflow: hidden;
          flex-shrink: 0;
          font-size: 16px;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .user-meta { min-width: 0; }

        .user-meta strong,
        .user-meta small {
          display: block;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .user-meta strong { font-size: 14px; font-weight: 700; }
        .user-meta small  { color: var(--muted); font-size: 12px; margin-top: 2px; }

        .follow-btn {
          border: 1px solid var(--line);
          background: transparent;
          color: var(--text);
          border-radius: var(--r-pill);
          padding: 7px 14px;
          font-family: 'DM Sans', sans-serif;
          font-size: 13px;
          font-weight: 700;
          cursor: pointer;
          white-space: nowrap;
          flex-shrink: 0;
          transition: background .15s, border-color .15s, color .15s;
        }

        .follow-btn:hover { background: var(--soft); }

        .follow-btn.following {
          color: var(--muted);
          border-color: transparent;
        }

        .post-img {
          width: 100%;
          max-height: 640px;
          object-fit: cover;
          background: #0a0a0e;
          cursor: pointer;
          transition: opacity .2s;
        }

        .post-img:hover { opacity: .95; }


        .post-media {
          position: relative;
          overflow: hidden;
          background: #0a0a0e;
          cursor: pointer;
          user-select: none;
          -webkit-tap-highlight-color: transparent;
        }

        .post-media .post-img {
          display: block;
        }

        .heart-burst {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 104px;
          height: 104px;
          display: grid;
          place-items: center;
          transform: translate(-50%, -50%) scale(.45);
          color: white;
          filter: drop-shadow(0 12px 32px rgba(255,43,214,.5));
          pointer-events: none;
          z-index: 4;
          animation: heartPop .78s cubic-bezier(.16,1,.3,1) forwards;
        }

        .heart-burst svg {
          width: 100%;
          height: 100%;
          fill: var(--hot);
          stroke: white;
          stroke-width: 1.5;
        }

        .heart-particle {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 9px;
          height: 9px;
          border-radius: 999px;
          background: linear-gradient(135deg, var(--hot), var(--accent));
          transform: translate(-50%, -50%);
          pointer-events: none;
          z-index: 5;
          animation: particlePop .72s ease-out forwards;
        }

        .icon-btn.like-pop {
          animation: likePulse .38s cubic-bezier(.16,1,.3,1);
        }

        @keyframes heartPop {
          0% { opacity: 0; transform: translate(-50%, -50%) scale(.35) rotate(-10deg); }
          18% { opacity: 1; transform: translate(-50%, -50%) scale(1.15) rotate(5deg); }
          42% { transform: translate(-50%, -50%) scale(.96) rotate(0deg); }
          72% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
          100% { opacity: 0; transform: translate(-50%, -58%) scale(.74); }
        }

        @keyframes particlePop {
          to {
            opacity: 0;
            transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(.25);
          }
        }

        @keyframes likePulse {
          0% { transform: scale(1); }
          45% { transform: scale(1.28); }
          100% { transform: scale(1); }
        }

        /* ─── Post body / actions ────────────────────────────────── */
        .post-body {
          padding: 13px 16px 16px;
        }

        .actions {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
        }

        .action-left {
          display: flex;
          gap: 4px;
        }

        .icon-btn {
          border: 0;
          background: transparent;
          color: var(--muted);
          width: 40px;
          height: 40px;
          border-radius: 50%;
          display: grid;
          place-items: center;
          cursor: pointer;
          transition: background .12s, color .12s, transform .12s;
        }

        .icon-btn svg { width: 20px; height: 20px; }

        .icon-btn:hover { background: var(--soft); color: var(--text); }
        .icon-btn:active { transform: scale(.88); }

        .icon-btn.active   { color: var(--hot); }
        .icon-btn.saved    { color: var(--accent); }
        .icon-btn.danger   { color: var(--danger); }

        .icon-btn.active:hover  { background: rgba(255,43,214,.1); }
        .icon-btn.saved:hover   { background: rgba(0,229,255,.1); }
        .icon-btn.danger:hover  { background: rgba(255,77,109,.1); }

        .likes-count {
          font-size: 13.5px;
          font-weight: 700;
          margin-bottom: 5px;
        }

        .caption {
          color: #d0d0e0;
          font-size: 14px;
          line-height: 1.55;
        }

        .caption strong { color: var(--text); margin-right: 4px; }

        .comments-link {
          display: inline-block;
          margin-top: 8px;
          color: var(--muted);
          font-size: 13px;
          font-weight: 600;
          transition: color .12s;
        }

        .comments-link:hover { color: var(--text); }

        /* ─── Right sidebar ──────────────────────────────────────── */
        .rightbar {
          grid-column: 3;
          position: sticky;
          top: 20px;
          height: max-content;
          display: flex;
          flex-direction: column;
          gap: 14px;
          z-index: 10;
        }

        .profile-card { padding: 16px; }

        .me {
          display: flex;
          align-items: center;
          gap: 12px;
          min-width: 0;
        }

        .me-info { min-width: 0; flex: 1; }

        .me-info strong,
        .me-info small {
          display: block;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .me-info strong { font-size: 14px; font-weight: 700; }
        .me-info small  { color: var(--muted); font-size: 12.5px; margin-top: 3px; }

        .me-actions {
          display: flex;
          gap: 8px;
          margin-top: 13px;
        }

        .me-btn {
          flex: 1;
          border-radius: var(--r-pill);
          padding: 9px 12px;
          font-family: 'DM Sans', sans-serif;
          font-size: 12.5px;
          font-weight: 700;
          cursor: pointer;
          text-align: center;
          transition: opacity .15s, transform .15s;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 6px;
        }

        .me-btn svg { width: 14px; height: 14px; }
        .me-btn:hover { opacity: .85; transform: translateY(-1px); }

        .me-btn.primary {
          border: 0;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          color: #000;
        }

        .me-btn.secondary {
          border: 1px solid var(--line);
          background: transparent;
          color: var(--muted);
        }

        /* ─── Suggestions ────────────────────────────────────────── */
        .suggest { padding: 16px; }

        .suggest-head {
          display:flex;
          align-items:center;
          justify-content:space-between;
          gap:10px;
          margin-bottom:12px;
        }

        .suggest h3 {
          font-size: 14px;
          font-weight: 700;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: .6px;
          margin:0;
        }

        .suggest-see-all {
          color:var(--accent);
          font-size:12px;
          font-weight:900;
        }

        .suggest-item {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
          padding: 9px 0;
          border-top: 1px solid var(--line);
        }

        .suggest-user {
          display: flex;
          align-items: center;
          gap: 10px;
          min-width: 0;
          flex: 1;
        }

        .suggest-user strong,
        .suggest-user small {
          display: block;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .suggest-user strong { font-size: 13.5px; font-weight: 700; }
        .suggest-user small  { color: var(--muted); font-size: 12px; margin-top: 2px; }

        .creator-tag {
          display:inline-flex;
          align-items:center;
          gap:4px;
          width:max-content;
          margin-top:5px;
          border:1px solid rgba(0,229,255,.34);
          border-radius:999px;
          padding:3px 7px;
          background:rgba(0,229,255,.08);
          color:var(--accent);
          font-size:10px;
          font-weight:950;
          letter-spacing:.2px;
        }

        .creator-tag svg { width:11px; height:11px; }

        .suggest-follow-btn {
          flex-shrink: 0;
          border: 1px solid var(--line);
          background: transparent;
          color: var(--accent);
          border-radius: var(--r-pill);
          padding: 6px 13px;
          font-family: 'DM Sans', sans-serif;
          font-size: 12.5px;
          font-weight: 700;
          cursor: pointer;
          transition: background .12s, border-color .12s;
        }

        .suggest-follow-btn:hover {
          background: rgba(0,229,255,.08);
          border-color: var(--accent);
        }

        /* ─── Global message toast ───────────────────────────────── */
        .message {
          font-size: 13.5px;
          font-weight: 600;
          min-height: 18px;
          padding: 0 2px;
          color: var(--danger);
          transition: opacity .3s;
        }

        .message.success { color: var(--success); }

        /* ─── Empty state ────────────────────────────────────────── */
        .empty {
          color: var(--muted);
          font-size: 14px;
          padding: 20px;
          text-align: center;
          line-height: 1.6;
        }

        /* ─── Loading skeleton ───────────────────────────────────── */
        .skeleton-post {
          overflow: hidden;
        }

        .skeleton-post .sk-head { padding: 14px 16px; display: flex; gap: 11px; align-items: center; }
        .sk { background: var(--soft); border-radius: 8px; animation: shimmer 1.4s ease infinite; }
        .sk-circle { border-radius: 50%; }

        @keyframes shimmer {
          0%   { opacity: .6; }
          50%  { opacity: 1; }
          100% { opacity: .6; }
        }

        /* ─── Bottom nav (mobile) ────────────────────────────────── */
        .bottom-nav {
          display: none;
          position: fixed;
          bottom: 12px;
          left: 50%;
          transform: translateX(-50%);
          width: min(96vw, 480px);
          height: 68px;
          z-index: 999;
          grid-template-columns: 1fr 1fr 60px 1fr 1fr;
          align-items: center;
          gap: 4px;
          padding: 6px 10px;
          border-radius: var(--r-pill);
          background: rgba(12,12,18,.96);
          border: 1px solid rgba(255,255,255,.1);
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
          box-shadow: 0 16px 50px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04) inset;
        }

        .bottom-nav a {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 3px;
          height: 54px;
          border-radius: 20px;
          color: var(--muted);
          font-size: 10px;
          font-weight: 700;
          transition: color .15s, background .15s;
        }

        .bottom-nav a svg { width: 22px; height: 22px; }

        .bottom-nav a.active { color: var(--text); background: var(--soft); }

        .bottom-nav .create-mobile {
          width: 52px;
          height: 52px;
          border-radius: 50%;
          margin: 0 auto;
          color: #000;
          background: linear-gradient(135deg, var(--accent), var(--accent2));
          box-shadow: 0 0 24px rgba(0,229,255,.3);
          flex-shrink: 0;
        }

        .bottom-nav .create-mobile svg { width: 24px; height: 24px; }

        /* ─── Responsive: Tablet (1024px) ────────────────────────── */
        @media (max-width: 1024px) {
          :root {
            --sidebar-w: 64px;
            --rightbar-w: 260px;
          }

          .sidebar {
            padding: 20px 8px 18px;
            align-items: center;
          }

          .logo { font-size: 26px; margin-bottom: 16px; }
          .logo-text { display: none; }

          .nav a {
            padding: 12px;
            border-radius: 16px;
            justify-content: center;
          }

          .nav a span { display: none; }
          .nav a svg { width: 22px; height: 22px; }
          .nav a .badge { display: none; }

          .nav a::before { display: none; }

          .create-btn span { display: none; }
          .create-btn { width: 44px; height: 44px; padding: 0; border-radius: 50%; }
        }

        /* ─── Responsive: Mobile (767px and below) ───────────────── */
        @media (max-width: 767px) {
          body { padding-bottom: 90px; }

          .app {
            grid-template-columns: 1fr;
            padding: 10px 10px 80px;
            gap: 12px;
          }

          .sidebar, .rightbar { display: none; }

          .top-mobile { display: flex; }

          .feed-header h1 { font-size: 28px; }

          .bottom-nav { display: grid; }

        @media (max-width: 390px) {
          .feed-header h1 { font-size: 24px; }
          .bottom-nav { width: 94vw; }
        }
    </style>
</head>

        <i data-lucide="plus"></i>
    </a>
    <a href="search.html" aria-label="Search">
        <i data-lucide="search"></i>
        <span>Search</span>
    </a>
    <a href="profile.html" aria-label="Profile">
        <i data-lucide="user"></i>
        <span>Profile</span>

<script type="module">
    import { auth, db } from "./firebase.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    import {
      collection,
      doc,
      getDoc,
      getDocs,
      query,
      orderBy,
      onSnapshot,
      updateDoc,
      arrayUnion,
      arrayRemove,
      addDoc,
      deleteDoc,
      serverTimestamp,
      limit
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    // ── State ──────────────────────────────────────────────────
    let currentUser     = null;
    let currentUserData = null;
    let allPosts        = [];
    let allUsers        = [];
    let activeFeed      = "forYou";

    const postsEl      = document.getElementById("posts");
    const pulseRow     = document.getElementById("pulseRow");
    const messageEl    = document.getElementById("message");
    const meCard       = document.getElementById("meCard");
    const suggestionsEl = document.getElementById("suggestions");

    // Ghost accounts removed from Firebase Auth can still exist in Firestore.
    // Hide the known orphan docs so they stop showing in creators/search/messages.
    const GHOST_USERNAMES = new Set(["nixydigital", "4072.esteban"]);

    function isVisibleUser(user) {
      const username = String(user?.username || "").trim().toLowerCase();
      const email = String(user?.email || "").trim();
      return Boolean(user?.uid && username && email && !GHOST_USERNAMES.has(username));
    }

    // ── Auth guard ─────────────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser     = user;
      currentUserData = await getUserData(user.uid);

      renderMe();
      await loadUsers();
      renderSuggestions();
      listenForPosts();
    });

    // ── Feed tabs ──────────────────────────────────────────────
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => {
          t.classList.remove("active");
          t.setAttribute("aria-selected", "false");
        });
        tab.classList.add("active");
        tab.setAttribute("aria-selected", "true");
        activeFeed = tab.dataset.feed;
        renderPosts();
      });
    });

    // ── Data fetching ──────────────────────────────────────────
    async function getUserData(uid) {
      const snapshot = await getDoc(doc(db, "users", uid));

      if (!snapshot.exists()) {
        return {
          uid,
          username:   currentUser.displayName || currentUser.email.split("@")[0],
          email:      currentUser.email || "",
          avatarUrl:  currentUser.photoURL || "",
          bio:        "Social, leveled up.",
          followers:  [],
          following:  [],
          savedPosts: [],
          isCreator: false,
          creatorTag: ""
        };
      }

      return {
        uid,
        followers:  [],
        following:  [],
        savedPosts: [],
        isCreator: false,
        creatorTag: "",
        ...snapshot.data()
      };
    }

    async function loadUsers() {
      const snapshot = await getDocs(collection(db, "users"));
      allUsers = snapshot.docs
        .map(d => ({
          id: d.id,
          uid: d.id,
          followers: [],
          following: [],
          savedPosts: [],
          isCreator: false,
          creatorTag: "",
          ...d.data()
        }))
        // Skip ghost accounts (deleted from Auth but Firestore doc still exists)
        .filter(isVisibleUser);
    }

    function listenForPosts() {
      const postsQuery = query(
        collection(db, "posts"),
        orderBy("createdAt", "desc"),
        limit(80)
      );

      onSnapshot(postsQuery, snapshot => {
        allPosts = snapshot.docs.map(d => ({
          id:             d.id,
          likedBy:        [],
          savedBy:        [],
          likesCount:     0,
          commentsCount:  0,
          commentPreview: [],
          isStory:        false,
          ...d.data()
        }));

        renderPulse();
        renderPosts();
      }, err => {
        console.error(err);
        showMessage(err.message, false);
      });
    }

    // ── Renderers ──────────────────────────────────────────────
    function renderMe() {
      const meActions = document.querySelector(".me-actions");

      meCard.innerHTML = `
        ${getAvatarHTML(currentUserData, "avatar")}
        <div class="me-info">
          <strong>${escapeHTML(currentUserData.username || "creator")}</strong>
          <small>${escapeHTML(currentUserData.bio || "Social, leveled up.")}</small>
        </div>
      `;

      lucide.createIcons();
    }

    function renderPulse() {
      const stories = allPosts.filter(p => p.isStory === true && getPostImage(p));

      if (!stories.length) {
        pulseRow.innerHTML = `<div class="empty" style="padding:0;font-size:13px">No Pulse stories yet. Create one!</div>`;
        return;
      }

      pulseRow.innerHTML = stories.map(post => `
        <a class="story" href="post.html?id=${post.id}">
          <div class="story-ring">
            <div class="story-inner">
              <img src="${getPostImage(post)}" alt="${escapeHTML(post.username || 'Story')}" loading="lazy">
            </div>
          </div>
          <span>${escapeHTML(post.username || "creator")}</span>
        </a>
      `).join("");
    }

    function renderPosts() {
      let posts = [...allPosts];

      if (activeFeed === "following") {
        const following = currentUserData.following || [];
        posts = posts.filter(p => following.includes(p.userId));
      }

      if (activeFeed === "rising") {
        posts = posts.sort((a, b) => {
          const aScore = (a.likesCount || 0) + (a.commentsCount || 0) * 2;
          const bScore = (b.likesCount || 0) + (b.commentsCount || 0) * 2;
          return bScore - aScore;
        });
      }

      if (!posts.length) {
        postsEl.innerHTML = `<article class="card empty">No posts here yet. Be the first!</article>`;
        return;
      }

      postsEl.innerHTML = posts.map((post, i) =>
        createPostHTML(post, i)
      ).join("");

      lucide.createIcons();
      attachPostEvents();
    }

    function createPostHTML(post, index = 0) {
      const liked     = (post.likedBy || []).includes(currentUser.uid);
      const saved     = (post.savedBy || []).includes(currentUser.uid);
      // ownPost: true if the post's userId matches the logged-in user, OR if it
      // was posted by the same email/displayName as a fallback for legacy posts
      const ownPost   = post.userId === currentUser.uid;
      // Never show follow for your own posts, even if userId is somehow missing
      const isStranger = !ownPost && !!post.userId;
      const following = (currentUserData.following || []).includes(post.userId);
      const image     = getPostImage(post);

      return `
        <article class="post card" data-post-id="${post.id}" data-user-id="${post.userId}"
          style="animation-delay:${index * 0.05}s">

          <div class="post-head">
            <a class="user-link" href="profile.html?uid=${post.userId}">
              ${getAvatarHTML(post, "avatar")}
              <div class="user-meta">
                <strong>${escapeHTML(post.username || "creator")}</strong>
                <small>${formatDate(post.createdAt)}${post.isStory ? " · Pulse" : ""}</small>
              </div>
            </a>

            ${ownPost
              ? `<button class="icon-btn danger" data-action="delete" aria-label="Delete post">
                   <i data-lucide="trash-2"></i>
                 </button>`
              : isStranger
                ? `<button class="follow-btn ${following ? "following" : ""}" data-action="follow">
                     ${following ? "Following" : "Follow"}
                   </button>`
                : ""
            }
          </div>

          ${image
            ? `<div class="post-media" data-post-id="${post.id}" data-href="post.html?id=${post.id}" role="button" tabindex="0" aria-label="Open post or double tap to like">
                 <img class="post-img" src="${image}" alt="Nexr post" loading="lazy" draggable="false">
               </div>`
            : ""
          }

          <div class="post-body">
            <div class="actions">
              <div class="action-left">
                <button class="icon-btn ${liked ? "active" : ""}" data-action="like" aria-label="Like">
                  <i data-lucide="heart"></i>
                </button>
                <a class="icon-btn" href="post.html?id=${post.id}" aria-label="Comment">
                  <i data-lucide="message-circle"></i>
                </a>
                <button class="icon-btn" data-action="share" aria-label="Share">
                  <i data-lucide="send"></i>
                </button>
              </div>
              <button class="icon-btn ${saved ? "saved" : ""}" data-action="save" aria-label="Save">
                <i data-lucide="bookmark"></i>
              </button>
            </div>

            <div class="likes-count">${post.likesCount || 0} likes</div>

            <p class="caption">
              <strong>${escapeHTML(post.username || "creator")}</strong>${escapeHTML(post.caption || "")}
            </p>

            ${(post.commentsCount || 0) > 0
              ? `<a class="comments-link" href="post.html?id=${post.id}">
                   View ${post.commentsCount} comment${post.commentsCount === 1 ? "" : "s"}
                 </a>`
              : ""
            }
          </div>
        </article>
      `;
    }

    function renderSuggestions() {
      const following   = currentUserData.following || [];
      const suggestions = allUsers
        .filter(u => Boolean(u.isCreator))
        .filter(u => u.uid !== currentUser.uid && !following.includes(u.uid))
        .sort((a, b) => (b.followers || []).length - (a.followers || []).length)
        .slice(0, 3);

      if (!suggestions.length) {
        suggestionsEl.innerHTML = `<div class="empty">No creator suggestions yet. Enable Creator mode in settings to join the list.</div>`;
        return;
      }

      suggestionsEl.innerHTML = suggestions.map(user => `
        <div class="suggest-item">
          <a class="suggest-user" href="profile.html?uid=${user.uid}">
            ${getAvatarHTML(user, "avatar")}
            <div>
              <strong>${escapeHTML(user.username || "creator")}</strong>
              <small>${(user.followers || []).length} followers</small>
              <span class="creator-tag"><i data-lucide="badge-check"></i>${escapeHTML(user.creatorTag || "Creator")}</span>
            </div>
          </a>
          <button class="suggest-follow-btn" data-suggest-follow="${user.uid}">Follow</button>
        </div>
      `).join("");

      document.querySelectorAll("[data-suggest-follow]").forEach(btn => {
        btn.addEventListener("click", async () => {
          await toggleFollow(btn.dataset.suggestFollow);
        });
      });

      lucide.createIcons();
    }

    // ── Event wiring ───────────────────────────────────────────
    function attachPostEvents() {
      document.querySelectorAll("[data-action='like']").forEach(btn => {
        btn.addEventListener("click", async () => {
          const postEl = btn.closest(".post");
          await toggleLike(postEl.dataset.postId, { burstTarget: btn });
        });
      });

      document.querySelectorAll(".post-media").forEach(media => {
        let tapTimer = null;
        let lastTap = 0;

        const openPost = () => {
          window.location.href = media.dataset.href;
        };

        const likeFromMedia = async () => {
          const postEl = media.closest(".post");
          await toggleLike(postEl.dataset.postId, { forceLike: true, burstTarget: media });
        };

        media.addEventListener("click", event => {
          event.preventDefault();
          const now = Date.now();

          if (now - lastTap < 280) {
            clearTimeout(tapTimer);
            tapTimer = null;
            lastTap = 0;
            likeFromMedia();
            return;
          }

          lastTap = now;
          tapTimer = setTimeout(openPost, 260);
        });

        media.addEventListener("keydown", event => {
          if (event.key === "Enter") openPost();
          if (event.key === " ") {
            event.preventDefault();
            likeFromMedia();
          }
        });
      });

      document.querySelectorAll("[data-action='save']").forEach(btn => {
        btn.addEventListener("click", async () => {
          await toggleSave(btn.closest(".post").dataset.postId);
        });
      });

      document.querySelectorAll("[data-action='follow']").forEach(btn => {
        btn.addEventListener("click", async () => {
          await toggleFollow(btn.closest(".post").dataset.userId);
        });
      });

      document.querySelectorAll("[data-action='delete']").forEach(btn => {
        btn.addEventListener("click", async () => {
          await deleteOwnPost(btn.closest(".post").dataset.postId);
        });
      });

      document.querySelectorAll("[data-action='share']").forEach(btn => {
        btn.addEventListener("click", async () => {
          const postId = btn.closest(".post").dataset.postId;
          const url = `${location.origin}${location.pathname.replace("index.html", "")}post.html?id=${postId}`;

          try {
            if (navigator.share) {
              await navigator.share({ url });
            } else {
              await navigator.clipboard.writeText(url);
              showMessage("Link copied to clipboard.", true);
            }
          } catch {
            showMessage("Could not copy link.", false);
          }
        });
      });
    }

    // ── Interactions ───────────────────────────────────────────
    async function toggleLike(postId, options = {}) {
      const post  = allPosts.find(p => p.id === postId);
      if (!post) return;

      const alreadyLiked = (post.likedBy || []).includes(currentUser.uid);
      const shouldLike = options.forceLike ? true : !alreadyLiked;

      if (alreadyLiked && options.forceLike) {
        playHeartBurst(options.burstTarget || document.querySelector(`[data-post-id="${postId}"]`));
        return;
      }

      post.likedBy = shouldLike
        ? [...(post.likedBy || []), currentUser.uid]
        : (post.likedBy || []).filter(uid => uid !== currentUser.uid);

      post.likesCount = shouldLike
        ? (post.likesCount || 0) + 1
        : Math.max((post.likesCount || 0) - 1, 0);

      updatePostLikeUI(postId, shouldLike, post.likesCount);

      if (shouldLike) {
        playHeartBurst(options.burstTarget || document.querySelector(`[data-post-id="${postId}"] .post-media`));
      }

      try {
        await updateDoc(doc(db, "posts", postId), {
          likedBy:    shouldLike ? arrayUnion(currentUser.uid) : arrayRemove(currentUser.uid),
          likesCount: post.likesCount
        });

        if (shouldLike && post.userId !== currentUser.uid) {
          await createNotification(post.userId, "like", "liked your post", postId);
        }
      } catch (error) {
        console.error(error);
        post.likedBy = alreadyLiked
          ? [...(post.likedBy || []), currentUser.uid]
          : (post.likedBy || []).filter(uid => uid !== currentUser.uid);
        post.likesCount = alreadyLiked
          ? (post.likesCount || 0) + 1
          : Math.max((post.likesCount || 0) - 1, 0);
        updatePostLikeUI(postId, alreadyLiked, post.likesCount);
        showMessage("Could not update like. Try again.", false);
      }
    }

    function updatePostLikeUI(postId, liked, likesCount) {
      const postEl = document.querySelector(`.post[data-post-id="${postId}"]`);
      if (!postEl) return;

      const likeBtn = postEl.querySelector(`[data-action="like"]`);
      const likesEl = postEl.querySelector(".likes-count");

      if (likeBtn) {
        likeBtn.classList.toggle("active", liked);
        likeBtn.classList.remove("like-pop");
        void likeBtn.offsetWidth;
        if (liked) likeBtn.classList.add("like-pop");
      }

      if (likesEl) {
        likesEl.textContent = `${likesCount || 0} like${likesCount === 1 ? "" : "s"}`;
      }
    }

    function playHeartBurst(target) {
      if (!target) return;

      const host = target.classList?.contains("post-media")
        ? target
        : target.closest?.(".post")?.querySelector(".post-media") || target;

      const heart = document.createElement("div");
      heart.className = "heart-burst";
      heart.innerHTML = `<i data-lucide="heart"></i>`;
      host.appendChild(heart);

      const points = [[0,-72],[52,-48],[72,0],[48,52],[0,72],[-48,52],[-72,0],[-52,-48]];
      points.forEach(([x, y], index) => {
        const particle = document.createElement("span");
        particle.className = "heart-particle";
        particle.style.setProperty("--x", `${x}px`);
        particle.style.setProperty("--y", `${y}px`);
        particle.style.animationDelay = `${index * 0.018}s`;
        host.appendChild(particle);
        setTimeout(() => particle.remove(), 850);
      });

      lucide.createIcons();
      setTimeout(() => heart.remove(), 850);
    }

    async function toggleSave(postId) {
      const saved   = (currentUserData.savedPosts || []).includes(postId);
      const userRef = doc(db, "users", currentUser.uid);
      const postRef = doc(db, "posts", postId);

      await updateDoc(userRef, {
        savedPosts: saved ? arrayRemove(postId) : arrayUnion(postId)
      });

      await updateDoc(postRef, {
        savedBy: saved ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
      });

      currentUserData.savedPosts = saved
        ? (currentUserData.savedPosts || []).filter(id => id !== postId)
        : [...(currentUserData.savedPosts || []), postId];

      renderPosts();
    }

    async function toggleFollow(targetUserId) {
      // Hard guard: never follow yourself
      if (!targetUserId || targetUserId === currentUser.uid) return;

      const following      = (currentUserData.following || []).includes(targetUserId);
      const currentUserRef = doc(db, "users", currentUser.uid);
      const targetUserRef  = doc(db, "users", targetUserId);

      await updateDoc(currentUserRef, {
        following: following ? arrayRemove(targetUserId) : arrayUnion(targetUserId)
      });

      await updateDoc(targetUserRef, {
        followers: following ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
      });

      currentUserData.following = following
        ? (currentUserData.following || []).filter(id => id !== targetUserId)
        : [...(currentUserData.following || []), targetUserId];

      if (!following) {
        await createNotification(targetUserId, "follow", "started following you");
      }

      renderPosts();
      renderSuggestions();
    }

    async function deleteOwnPost(postId) {
      const post = allPosts.find(p => p.id === postId);
      if (!post || post.userId !== currentUser.uid) return;

      if (!confirm("Delete this post? This cannot be undone.")) return;

      await deleteDoc(doc(db, "posts", postId));
      showMessage("Post deleted.", true);
    }

    async function createNotification(toUserId, type, text, postId = "") {
      await addDoc(collection(db, "notifications"), {
        toUserId,
        fromUserId:   currentUser.uid,
        fromUsername: currentUserData.username || "creator",
        type,
        text,
        postId,
        read: false,
        createdAt: serverTimestamp()
      });
    }

    // ── Utilities ──────────────────────────────────────────────
    function getAvatarHTML(data, className) {
      const name      = data.username || data.displayName || "N";
      const avatarUrl = data.avatarUrl || data.photoURL || "";

      if (avatarUrl) {
        return `<div class="${className}"><img src="${avatarUrl}" alt="${escapeHTML(name)}" loading="lazy"></div>`;
      }

      return `<div class="${className}">${escapeHTML(name.charAt(0).toUpperCase())}</div>`;
    }

    function getPostImage(post) {
      return post.imageData || post.imageUrl || "";
    }

    function formatDate(timestamp) {
      if (!timestamp?.toDate) return "Just now";

      const date    = timestamp.toDate();
      const diff    = Date.now() - date.getTime();
      const minutes = Math.floor(diff / 60000);
      const hours   = Math.floor(minutes / 60);
      const days    = Math.floor(hours / 24);

      if (minutes < 1)  return "Just now";
      if (minutes < 60) return `${minutes}m ago`;
      if (hours   < 24) return `${hours}h ago`;
      if (days    < 7)  return `${days}d ago`;

      return date.toLocaleDateString();
    }

    function showMessage(text, success = false) {
      messageEl.textContent = text;
      messageEl.classList.toggle("success", success);

      if (text) {
        setTimeout(() => {
          messageEl.textContent = "";
          messageEl.classList.remove("success");
        }, 2800);
      }
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    lucide.createIcons();
</script>
</body>
