<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexr — Create</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --bg:#050507;
      --panel:rgba(16,16,19,.86);
      --line:rgba(255,255,255,.08);
      --text:#f0f0f5;
      --muted:#8888a0;
      --accent:#00e5ff;
      --accent2:#7c3aed;
      --hot:#ff2bd6;
      --danger:#ff4d6d;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:'DM Sans',Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(0,229,255,.16), transparent 30%),
        radial-gradient(circle at 80% 15%, rgba(124,58,237,.22), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(255,43,214,.1), transparent 28%),
        var(--bg);
    }

    a { color:inherit; text-decoration:none; }
    button { font-family:inherit; transition:.18s ease; }
    button:hover { transform:translateY(-2px); }
    button:active { transform:scale(.96); }
    svg { width:22px; height:22px; }

    .orb {
      position:fixed;
      width:280px;
      height:280px;
      border-radius:50%;
      filter:blur(28px);
      opacity:.35;
      z-index:0;
      animation:float 7s ease-in-out infinite;
      pointer-events:none;
    }

    .orb.one {
      background:var(--accent);
      top:8%;
      left:5%;
    }

    .orb.two {
      background:var(--accent2);
      right:7%;
      bottom:7%;
      animation-delay:-2s;
    }

    @keyframes float {
      0%,100% { transform:translateY(0) scale(1); }
      50% { transform:translateY(-26px) scale(1.08); }
    }

    .page {
      position:relative;
      z-index:2;
      width:min(980px,94vw);
      margin:auto;
      padding:28px 0 70px;
      animation:rise .65s ease both;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(24px) scale(.98); }
      to { opacity:1; transform:translateY(0) scale(1); }
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
    }

    .logo {
      font-size:34px;
      font-weight:950;
      letter-spacing:-1px;
      font-family:'Space Grotesk',Arial,sans-serif;
        }

    .logo span {
      color:var(--accent);
      text-shadow:0 0 18px var(--accent);
    }

    .back {
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-weight:800;
    }

    .shell {
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:24px;
    }

    .card {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:32px;
      padding:18px;
      backdrop-filter:blur(18px);
      box-shadow:0 20px 80px rgba(0,0,0,.24);
    }

    .preview {
      height:560px;
      border-radius:24px;
      border:1px dashed rgba(0,229,255,.55);
      background:
        radial-gradient(circle at top left, rgba(0,229,255,.28), transparent 35%),
        radial-gradient(circle at bottom right, rgba(124,58,237,.4), transparent 42%),
        #09090b;
      display:grid;
      place-items:center;
      text-align:center;
      color:var(--muted);
      cursor:pointer;
      overflow:hidden;
    }

    .preview img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .preview-placeholder {
      display:grid;
      place-items:center;
      gap:10px;
      padding:20px;
    }

    .preview-placeholder svg {
      width:54px;
      height:54px;
      color:var(--accent);
    }

    .side h1 {
      margin:0;
      font-size:42px;
      letter-spacing:-2px;
    }

    .side p {
      color:var(--muted);
      line-height:1.6;
    }

    textarea {
      width:100%;
      min-height:150px;
      resize:none;
      background:#09090b;
      color:white;
      border:1px solid var(--line);
      border-radius:20px;
      padding:15px;
      outline:none;
      font-size:15px;
      transition:.2s ease;
    }

    textarea:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(0,229,255,.08);
    }

    input[type="file"] {
      display:none;
    }

    .story-toggle {
      margin-top:14px;
      padding:15px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(255,255,255,.035);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      cursor:pointer;
    }

    .story-toggle-left {
      display:flex;
      align-items:center;
      gap:12px;
    }

    .story-icon {
      width:42px;
      height:42px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,var(--hot),var(--accent2),var(--accent));
      color:white;
      box-shadow:0 0 24px rgba(255,43,214,.28);
    }

    .story-toggle strong {
      display:block;
      font-size:15px;
    }

    .story-toggle small {
      color:var(--muted);
    }

    .switch {
      position:relative;
      width:54px;
      height:30px;
      flex:0 0 auto;
    }

    .switch input {
      display:none;
    }

    .slider {
      position:absolute;
      inset:0;
      border-radius:999px;
      background:#27272f;
      border:1px solid var(--line);
      transition:.2s ease;
    }

    .slider::before {
      content:"";
      position:absolute;
      width:22px;
      height:22px;
      top:3px;
      left:4px;
      border-radius:50%;
      background:white;
      transition:.2s ease;
    }

    .switch input:checked + .slider {
      background:linear-gradient(135deg,var(--hot),var(--accent2));
      box-shadow:0 0 24px rgba(255,43,214,.26);
    }

    .switch input:checked + .slider::before {
      transform:translateX(23px);
    }

    .actions {
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .file-btn,
    .share-btn,
    .clear-btn {
      border:0;
      border-radius:999px;
      padding:14px;
      font-weight:950;
      cursor:pointer;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
    }

    .file-btn {
      background:#15151a;
      border:1px solid var(--line);
      color:white;
    }

    .share-btn {
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:black;
    }

    .clear-btn {
      background:transparent;
      border:1px solid var(--line);
      color:var(--muted);
    }

    .meta {
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    .meta-card {
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      border-radius:20px;
      padding:14px;
    }

    .meta-card strong {
      display:block;
      margin-bottom:4px;
    }

    .meta-card small {
      color:var(--muted);
    }

    .message {
      min-height:22px;
      color:var(--danger);
      margin-top:12px;
      font-size:14px;
    }

    .success {
      color:var(--accent);
    }

    .loading {
      opacity:.72;
      pointer-events:none;
    }

    @media(max-width:850px) {
      .page { padding-bottom: 90px; }

      .shell {
        grid-template-columns:1fr;
      }

      .preview {
        height:390px;
      }

      .side h1 {
        font-size:34px;
      }
    }
  </style>
</head>

<body>
<div class="orb one"></div>
<div class="orb two"></div>

<main class="page">
  <header class="topbar">
    <a class="back" href="index.html"><i data-lucide="arrow-left"></i> Home</a>
    <div class="logo">Nex<span>r</span></div>
  </header>

  <section class="shell" id="createShell">
    <section class="card">
      <label class="preview" for="imageInput" id="preview">
        <div class="preview-placeholder">
          <i data-lucide="image-plus"></i>
          <h2>Upload a photo</h2>
          <p>We’ll compress it so Nexr stays free to run.</p>
        </div>
      </label>

      <input type="file" id="imageInput" accept="image/*">
    </section>

    <section class="card side">
      <h1>Create a Flow post</h1>
      <p>Share something visual. Add it to Pulse when you want it featured in the story bar too.</p>

      <textarea id="caption" maxlength="280" placeholder="Write a caption..."></textarea>

      <label class="story-toggle" for="storyToggle">
        <div class="story-toggle-left">
          <div class="story-icon">
            <i data-lucide="zap"></i>
          </div>
          <div>
            <strong>Add to Pulse Story</strong>
            <small>Shows in Nexr Flow and the Pulse bar.</small>
          </div>
        </div>

        <span class="switch">
          <input type="checkbox" id="storyToggle">
          <span class="slider"></span>
        </span>
      </label>

      <div class="actions">
        <label class="file-btn" for="imageInput">
          <i data-lucide="image"></i>
          Choose image
        </label>

        <button class="share-btn" id="shareBtn">
          <i data-lucide="send"></i>
          Share to Nexr
        </button>

        <button class="clear-btn" id="clearBtn">
          <i data-lucide="trash-2"></i>
          Clear
        </button>
      </div>

      <div class="message" id="message"></div>

      <div class="meta">
        <div class="meta-card">
          <strong>Free storage mode</strong>
          <small>Photos are compressed and saved as Firestore image data.</small>
        </div>

        <div class="meta-card">
          <strong>Pulse behavior</strong>
          <small>Normal posts go to Flow only. Pulse posts go to Flow + Pulse.</small>
        </div>
      </div>
    </section>
  </section>
</main>

<script type="module">
  import { injectMobileNav } from "./nav.js";
injectMobileNav("create");

import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  collection,
  doc,
  getDoc,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

let currentUser = null;
let currentUserData = null;
let imageData = null;

const shell = document.getElementById("createShell");
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const captionInput = document.getElementById("caption");
const storyToggle = document.getElementById("storyToggle");
const message = document.getElementById("message");

onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  currentUserData = await getCurrentUserData(user.uid);
});

async function getCurrentUserData(uid) {
  const userRef = doc(db, "users", uid);
  const snapshot = await getDoc(userRef);

  if (!snapshot.exists()) {
    return {
      uid,
      username: currentUser.displayName || currentUser.email.split("@")[0],
      avatarUrl: currentUser.photoURL || "",
      bio: "Social, leveled up.",
      followers: [],
      following: [],
      savedPosts: []
    };
  }

  return snapshot.data();
}

imageInput.addEventListener("change", async () => {
  const file = imageInput.files[0];
  if (!file) return;

  if (!file.type.startsWith("image/")) {
    showMessage("Please choose an image file.");
    return;
  }

  try {
    setLoading(true);
    showMessage("Compressing image...", true);

    imageData = await compressImage(file, 900, 0.68);

    preview.innerHTML = `<img src="${imageData}" alt="Selected image">`;
    showMessage("Image ready.", true);
  } catch (error) {
    console.error(error);
    showMessage("Could not process image.");
  } finally {
    setLoading(false);
  }
});

document.getElementById("shareBtn").addEventListener("click", async () => {
  const caption = captionInput.value.trim();
  const isStory = storyToggle.checked;

  if (!caption && !imageData) {
    showMessage("Add an image or caption first.");
    return;
  }

  if (isStory && !imageData) {
    showMessage("Pulse stories need an image.");
    return;
  }

  if (!currentUser || !currentUserData) {
    showMessage("Still loading your account. Try again.");
    return;
  }

  try {
    setLoading(true);
    showMessage("Posting to Nexr...", true);

    await addDoc(collection(db, "posts"), {
      userId: currentUser.uid,
      username: currentUserData.username || currentUser.displayName || "creator",
      avatar: (currentUserData.username || currentUser.displayName || "C").charAt(0).toUpperCase(),
      avatarUrl: currentUserData.avatarUrl || currentUser.photoURL || "",
      caption: caption || "New Nexr post.",
      imageData: imageData || "",
      imageUrl: "",
      isStory,
      likedBy: [],
      likesCount: 0,
      savedBy: [],
      commentsCount: 0,
      commentPreview: [],
      createdAt: serverTimestamp()
    });

    showMessage(isStory ? "Posted to Flow and Pulse. Redirecting..." : "Posted to Flow. Redirecting...", true);

    setTimeout(() => {
      window.location.href = "index.html";
    }, 700);
  } catch (error) {
    console.error(error);
    showMessage(error.message);
  } finally {
    setLoading(false);
  }
});

document.getElementById("clearBtn").addEventListener("click", () => {
  imageData = null;
  imageInput.value = "";
  captionInput.value = "";
  storyToggle.checked = false;

  preview.innerHTML = `
    <div class="preview-placeholder">
      <i data-lucide="image-plus"></i>
      <h2>Upload a photo</h2>
      <p>We’ll compress it so Nexr stays free to run.</p>
    </div>
  `;

  showMessage("");
  lucide.createIcons();
});

function compressImage(file, maxWidth = 900, quality = 0.68) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onerror = () => reject(new Error("Could not read image."));

    reader.onload = event => {
      const img = new Image();

      img.onerror = () => reject(new Error("Could not load image."));

      img.onload = () => {
        const canvas = document.createElement("canvas");

        const scale = Math.min(1, maxWidth / img.width);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        let compressed = canvas.toDataURL("image/jpeg", quality);

        if (compressed.length > 900000) {
          compressed = canvas.toDataURL("image/jpeg", 0.5);
        }

        if (compressed.length > 1000000) {
          reject(new Error("Image is still too large. Try a smaller photo."));
          return;
        }

        resolve(compressed);
      };

      img.src = event.target.result;
    };

    reader.readAsDataURL(file);
  });
}

function setLoading(isLoading) {
  shell.classList.toggle("loading", isLoading);
}

function showMessage(text, success = false) {
  message.textContent = text;
  message.classList.toggle("success", success);
}

lucide.createIcons();
</script>
</body>
</html>
